spring.application.name=server
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.address=0.0.0.0

# ===============================
# AWS S3 Configuration (SECURED)
# ===============================
aws.s3.bucket.name=syncvault-2026
aws.s3.region=ap-south-1
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
syncvault.jwt.secret=${JWT_SECRET}
syncvault.auth.username=${APP_USERNAME}
syncvault.auth.password=${APP_PASSWORD}